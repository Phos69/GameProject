name: Soak

# I soak/stress (tests/suites/soak) sono lunghi: fuori dalla CI rapida, girano
# di notte e su richiesta manuale.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: soak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soak:
    name: Soak & stress suite
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot-bin
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "Downloading $url"
          curl -fL "$url" -o /tmp/godot.zip
          unzip -o /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Godot version
        run: godot --version

      - name: Import project resources
        run: godot --headless --import --path . || true

      - name: Run soak/stress suite (GUT)
        run: godot --headless -s res://addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.soak.json -gexit
