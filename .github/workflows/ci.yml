name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Annulla run precedenti sullo stesso ref quando arrivano nuovi commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Headless test suite
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot-bin
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "Downloading $url"
          curl -fL "$url" -o /tmp/godot.zip
          unzip -o /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Godot version
        run: godot --version

      - name: Import project resources
        run: godot --headless --import --path . || true

      - name: Run legacy test suite (SceneTree, in dismissione)
        env:
          GODOT: godot
          SKIP_IMPORT: "1"
          TEST_CATEGORY: "all"
          TEST_LOG_DIR: "build/test_logs"
          TEST_TIMEOUT: "240"
        run: bash tools/run_tests.sh "" "$TEST_CATEGORY"

      # Nuova suite GUT (tests/suites/**): un solo processo Godot per tutta la
      # suite. Cresce milestone dopo milestone finche assorbe i test legacy sopra.
      - name: Run GUT suite (nuova)
        run: godot --headless -s res://addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json -gexit

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-test-logs
          path: build/test_logs
          if-no-files-found: ignore
